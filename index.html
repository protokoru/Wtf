<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>囁く闇 3D - ホラーゲーム</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@800&family=Inter:wght@400;700&display=swap" rel="stylesheet">
    
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #000; color: #fff; overflow: hidden; font-family: 'Inter', sans-serif; touch-action: none; }
        #gameCanvas { display: block; width: 100%; height: 100%; position: absolute; top: 0; left: 0; z-index: 1; }
        .ui-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; align-items: center; background: rgba(0, 0, 0, 0.9); z-index: 20; transition: opacity 0.5s ease; }
        .hidden { opacity: 0; pointer-events: none; }
        .horror-font { font-family: 'Shippori Mincho', serif; letter-spacing: 0.2em; }
        .glitch { animation: glitch-anim 0.2s linear infinite; }
        @keyframes glitch-anim {
            0% { transform: translate(0) }
            20% { transform: translate(-5px, 5px) }
            40% { transform: translate(-5px, -5px) }
            60% { transform: translate(5px, 5px) }
            80% { transform: translate(5px, -5px) }
            100% { transform: translate(0) }
        }
        #hud { position: absolute; top: 20px; left: 20px; z-index: 10; pointer-events: none; }
        #crosshair { position: absolute; top: 50%; left: 50%; width: 4px; height: 4px; background-color: rgba(255, 255, 255, 0.5); border-radius: 50%; transform: translate(-50%, -50%); z-index: 10; pointer-events: none; }
        #fearOverlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, transparent 30%, rgba(150, 0, 0, 0.8) 100%); z-index: 15; opacity: 0; pointer-events: none; mix-blend-mode: multiply; transition: opacity 0.1s; }
        #mobileControls { position: absolute; bottom: 20px; width: 100%; display: flex; justify-content: space-between; padding: 0 40px; z-index: 10; pointer-events: none; opacity: 0.5; }
        #flashlightBtn { position: absolute; bottom: 30px; right: 30px; width: 60px; height: 60px; border-radius: 50%; background-color: rgba(50, 50, 50, 0.6); border: 2px solid #888; color: #fff; font-size: 24px; display: flex; justify-content: center; align-items: center; z-index: 12; cursor: pointer; transition: all 0.2s; user-select: none; -webkit-user-select: none; }
        #flashlightBtn.active { background-color: rgba(200, 200, 150, 0.3); border-color: #ffc; box-shadow: 0 0 15px rgba(255, 255, 200, 0.5); }
        #heartrate-container { position: absolute; bottom: 20px; left: 20px; width: 200px; pointer-events: none; z-index: 10; }
        @media (min-width: 768px) { #mobileControls { display: none; } #flashlightBtn { display: none; } }
    </style>
</head>
<body>

    <div id="hud" class="hidden">
        <div class="horror-font text-2xl mb-2 text-blue-200" style="text-shadow: 0 0 10px blue;">遺物: <span id="score">0</span> / 3</div>
        <div class="text-sm text-gray-400 font-sans">バッテリー (FキーでON/OFF)</div>
        <div class="w-48 h-3 bg-gray-800 border border-gray-600 mt-1 relative">
            <div id="batteryBar" class="h-full bg-green-500 w-full transition-all duration-200"></div>
        </div>
    </div>
    
    <div id="heartrate-container" class="hidden">
        <div style="color: #ff5555; font-weight: bold; margin-bottom: 5px; text-shadow: 0 0 5px #f00; font-family: 'Courier New', Courier, monospace;">BPM: <span id="heartrate-text">70</span></div>
        <div style="width: 100%; height: 12px; background: rgba(50, 0, 0, 0.5); border: 1px solid #ff0000; border-radius: 6px; overflow: hidden;">
            <div id="heartrate-bar" style="width: 0%; height: 100%; background: linear-gradient(90deg, #aa0000, #ff5555); transition: width 0.1s ease-out;"></div>
        </div>
    </div>

    <div id="crosshair" class="hidden"></div>
    <div id="fearOverlay"></div>
    <button id="flashlightBtn" class="hidden">🔦</button>

    <div id="mobileControls" class="hidden">
        <div class="text-sm">◀ 左スワイプで移動</div>
        <div class="text-sm">右スワイプで視点 ▶</div>
    </div>

    <div id="startScreen" class="ui-layer">
        <h1 class="text-6xl md:text-8xl font-bold horror-font text-red-700 mb-4 tracking-widest" style="text-shadow: 0 0 30px red;">囁く闇</h1>
        <p class="mb-10 text-gray-400 max-w-lg text-center leading-loose text-lg">
            青く光る「遺物」を3つ集めろ。<br>
            光の届かない廃墟の中には、<br>
            "何か"が徘徊している。<br><br>
            マップ上の「電池（緑）」を拾って<br>
            懐中電灯のバッテリーを維持しろ。<br>
            <span class="text-sm text-gray-500 block mt-4 border-t border-gray-800 pt-4">
                [ PC ] マウスで視点 / WASDで移動 / Fキーでライト<br>
                [ スマホ ] 左スワイプで移動 / 右スワイプで視点 / 右下ボタンでライト
            </span>
        </p>
        <button id="startBtn" class="px-10 py-4 bg-red-900 hover:bg-red-700 text-white rounded-sm border border-red-500 shadow-[0_0_20px_rgba(220,38,38,0.6)] transition-all horror-font text-2xl">
            闇へ足を踏み入れる (音量注意)
        </button>
    </div>

    <div id="gameOverScreen" class="ui-layer hidden bg-black">
        <h1 class="text-7xl md:text-9xl font-bold horror-font text-red-600 mb-6 glitch" style="text-shadow: 0 0 50px red;">捕 ま っ た</h1>
        <button id="restartBtn" class="mt-12 px-8 py-3 border border-red-800 text-red-500 hover:bg-red-900 hover:text-white transition-colors horror-font text-xl bg-black bg-opacity-50">
            もう一度
        </button>
    </div>

    <div id="clearScreen" class="ui-layer hidden" style="background: rgba(10, 15, 25, 0.95);">
        <h1 class="text-5xl md:text-7xl font-bold horror-font text-yellow-300 mb-6" style="text-shadow: 0 0 30px yellow;">脱 出 成 功</h1>
        <p class="text-gray-300 mb-10 text-xl">あなたは黄色の迷宮を抜け、光へ到達した。</p>
        <button id="clearRestartBtn" class="px-8 py-3 border border-yellow-500 text-yellow-400 hover:bg-yellow-900 hover:text-white transition-colors horror-font text-xl">
            再び挑む
        </button>
    </div>

    <script>
        const startScreen = document.getElementById('startScreen');
        const gameOverScreen = document.getElementById('gameOverScreen');
        const clearScreen = document.getElementById('clearScreen');
        const startBtn = document.getElementById('startBtn');
        const restartBtn = document.getElementById('restartBtn');
        const clearRestartBtn = document.getElementById('clearRestartBtn');
        const hud = document.getElementById('hud');
        const scoreEl = document.getElementById('score');
        const batteryBar = document.getElementById('batteryBar');
        const heartrateContainer = document.getElementById('heartrate-container');
        const hrText = document.getElementById('heartrate-text');
        const hrBar = document.getElementById('heartrate-bar');
        const crosshair = document.getElementById('crosshair');
        const fearOverlay = document.getElementById('fearOverlay');
        const mobileControls = document.getElementById('mobileControls');
        const flashlightBtn = document.getElementById('flashlightBtn');

        let gameState = 'START';
        let animationFrameId;
        let game = null;
        const TARGET_ARTIFACTS = 3;
        const TOTAL_ARTIFACTS = 5;

        const AudioEngine = {
            initialized: false, drone: null, heartbeat: null, jumpscareSynth: null, footstep: null, clickSynth: null, lastBeatTime: 0,
            async init() {
                if (this.initialized) return;
                await Tone.start();
                this.drone = new Tone.FMSynth({ harmonicity: 0.5, modulationIndex: 1.2, oscillator: { type: "sine" }, envelope: { attack: 2, decay: 0.2, sustain: 1, release: 5 }, modulation: { type: "triangle" } });
                const droneFilter = new Tone.Filter(200, "lowpass").toDestination();
                const droneReverb = new Tone.Reverb(5).connect(droneFilter);
                this.drone.connect(droneReverb);
                this.drone.volume.value = -10;

                this.heartbeat = new Tone.MembraneSynth({ pitchDecay: 0.05, octaves: 2, oscillator: { type: "sine" }, envelope: { attack: 0.01, decay: 0.4, sustain: 0.01, release: 1.4 } }).toDestination();
                this.heartbeat.volume.value = -10;

                this.jumpscareSynth = new Tone.PolySynth(Tone.Synth, { oscillator: { type: "sawtooth" }, envelope: { attack: 0.01, decay: 1, sustain: 0.1, release: 2 } });
                const distortion = new Tone.Distortion(0.8).toDestination();
                this.jumpscareSynth.connect(distortion);
                this.jumpscareSynth.volume.value = 5;

                this.footstep = new Tone.NoiseSynth({ noise: { type: 'brown' }, envelope: { attack: 0.01, decay: 0.1, sustain: 0, release: 0.1 } }).toDestination();
                this.footstep.volume.value = -25;
                
                this.clickSynth = new Tone.MembraneSynth({ pitchDecay: 0.01, octaves: 1, oscillator: { type: "sine" }, envelope: { attack: 0.001, decay: 0.1, sustain: 0, release: 0.1 } }).toDestination();
                this.initialized = true;
            },
            startBGM() { if (!this.initialized) return; this.drone.triggerAttack("C1"); },
            stopBGM() { if (!this.initialized) return; this.drone.triggerRelease(); },
            playHeartbeat(bpm) {
                if (!this.initialized) return;
                const now = Tone.now();
                const interval = 60 / bpm; 
                if (now - this.lastBeatTime >= interval) {
                    const vol = Math.min(-5, -20 + (bpm - 70) * 0.2); 
                    this.heartbeat.volume.value = vol;
                    this.heartbeat.triggerAttackRelease("C1", "8n");
                    this.lastBeatTime = now;
                }
            },
            playJumpscare() { if (!this.initialized) return; this.jumpscareSynth.triggerAttackRelease(["C2", "C#2", "F#2", "G2"], "2n"); },
            playArtifactSound() {
                if (!this.initialized) return;
                const synth = new Tone.Synth({ oscillator: { type: "sine" }, envelope: { attack: 0.1, decay: 2, sustain: 0, release: 1 } }).toDestination();
                synth.triggerAttackRelease("C5", "8n");
            },
            playBatterySound() {
                if (!this.initialized) return;
                const synth = new Tone.Synth({ oscillator: { type: "square" }, envelope: { attack: 0.01, decay: 0.1, sustain: 0, release: 0.1 } }).toDestination();
                synth.triggerAttackRelease("C6", "16n");
                setTimeout(() => { if(gameState === 'PLAYING') synth.triggerAttackRelease("E6", "16n"); }, 100);
            },
            playClickSound() { if (!this.initialized) return; this.clickSynth.triggerAttackRelease("G2", "32n"); },
            playFootstep() { if (!this.initialized) return; this.footstep.triggerAttackRelease("16n"); }
        };

        class Game {
            constructor() {
                this.scene = new THREE.Scene();
                this.scene.fog = new THREE.FogExp2(0x020202, 0.08); // 黒い霧（開始時）
                
                this.camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
                this.renderer = new THREE.WebGLRenderer({ antialias: false });
                this.renderer.setSize(window.innerWidth, window.innerHeight);
                this.renderer.setClearColor(0x000000);
                this.renderer.domElement.id = 'gameCanvas';
                document.body.insertBefore(this.renderer.domElement, document.body.firstChild);
                
                this.clock = new THREE.Clock();
                this.artifacts = [];
                this.batteries = [];
                this.colliders = [];
                this.fluorescentLights = [];
                this.artifactsCollected = 0;
                this.inBackrooms = false;
                this.backroomsOffset = new THREE.Vector3(0, -100, -500); // 異次元の座標

                this.setupEnvironment();
                this.setupPlayer();
                this.setupEnemy();
                this.setupInput();
                this.setupBackrooms();

                window.addEventListener('resize', this.onWindowResize.bind(this), false);
            }

            setupEnvironment() {
                // 通常世界の木目テクスチャ
                const createWoodTexture = (colorStr) => {
                    const canvas = document.createElement('canvas');
                    canvas.width = 512; canvas.height = 512;
                    const ctx = canvas.getContext('2d');
                    ctx.fillStyle = colorStr; ctx.fillRect(0, 0, 512, 512);
                    for(let i=0; i<1000; i++) {
                        ctx.fillStyle = `rgba(0,0,0,${Math.random() * 0.15})`; ctx.fillRect(Math.random()*512, Math.random()*512, Math.random()*100+10, 2);
                        ctx.fillStyle = `rgba(255,255,255,${Math.random() * 0.05})`; ctx.fillRect(Math.random()*512, Math.random()*512, Math.random()*100+10, 2);
                    }
                    const tex = new THREE.CanvasTexture(canvas);
                    tex.wrapS = THREE.RepeatWrapping; tex.wrapT = THREE.RepeatWrapping; tex.repeat.set(4, 4);
                    return tex;
                };

                const floorTex = createWoodTexture('#1a110a');
                const floorMat = new THREE.MeshStandardMaterial({ map: floorTex, roughness: 0.9, bumpMap: floorTex, bumpScale: 0.05 }); 
                const floorGeo = new THREE.PlaneGeometry(200, 200);
                const floor = new THREE.Mesh(floorGeo, floorMat);
                floor.rotation.x = -Math.PI / 2;
                this.scene.add(floor);

                const ceiling = new THREE.Mesh(floorGeo, floorMat);
                ceiling.rotation.x = Math.PI / 2; ceiling.position.y = 10;
                this.scene.add(ceiling);

                const wallTex = createWoodTexture('#2b1a10');
                const wallMat = new THREE.MeshStandardMaterial({ map: wallTex, roughness: 1.0, bumpMap: wallTex, bumpScale: 0.1 });
                
                const boundarySize = 90;
                const bounds = [
                    { x: 0, z: boundarySize, w: 200, d: 2 },
                    { x: 0, z: -boundarySize, w: 200, d: 2 },
                    { x: boundarySize, z: 0, w: 2, d: 200 },
                    { x: -boundarySize, z: 0, w: 2, d: 200 },
                ];
                bounds.forEach(b => {
                    const bMesh = new THREE.Mesh(new THREE.BoxGeometry(b.w, 10, b.d), wallMat);
                    bMesh.position.set(b.x, 5, b.z);
                    this.scene.add(bMesh);
                    this.colliders.push(new THREE.Box3().setFromObject(bMesh));
                });

                // ポータル（隠しドア）
                const portalFrameGeo = new THREE.BoxGeometry(10, 12, 1);
                const portalFrameMat = new THREE.MeshStandardMaterial({ color: 0x000000, roughness: 1 });
                const portalFrame = new THREE.Mesh(portalFrameGeo, portalFrameMat);
                portalFrame.position.set(0, 6, -89.5);
                this.scene.add(portalFrame);

                const portalGeo = new THREE.PlaneGeometry(8, 10);
                this.portalMat = new THREE.MeshBasicMaterial({ color: 0xffdd00, transparent: true, opacity: 0.8, side: THREE.DoubleSide });
                const portalMesh = new THREE.Mesh(portalGeo, this.portalMat);
                portalMesh.position.set(0, 5, -88.9); 
                this.scene.add(portalMesh);

                const portalLight = new THREE.PointLight(0xffdd00, 3.0, 15);
                portalLight.position.set(0, 5, -85);
                this.scene.add(portalLight);
                
                this.backroomsPortalBox = new THREE.Box3(
                    new THREE.Vector3(-4, 0, -90),
                    new THREE.Vector3(4, 10, -85)
                );

                // 部屋
                this.rooms = [
                    { cx: 0, cz: -60, w: 40, d: 40, door: 'south' }, { cx: -50, cz: 50, w: 30, d: 30, door: 'east' },
                    { cx: 60, cz: 40, w: 40, d: 30, door: 'west' }, { cx: -60, cz: -10, w: 25, d: 25, door: 'east' },
                    { cx: 50, cz: -20, w: 30, d: 30, door: 'west' },
                ];

                const createWall = (x, z, w, d) => {
                    const mesh = new THREE.Mesh(new THREE.BoxGeometry(w, 10, d), wallMat);
                    mesh.position.set(x, 5, z); this.scene.add(mesh); this.colliders.push(new THREE.Box3().setFromObject(mesh));
                };

                this.rooms.forEach(r => {
                    const t = 2, ds = 10;
                    if (r.door === 'north') { createWall(r.cx - r.w/4 - ds/4, r.cz - r.d/2, r.w/2 - ds/2, t); createWall(r.cx + r.w/4 + ds/4, r.cz - r.d/2, r.w/2 - ds/2, t); } else { createWall(r.cx, r.cz - r.d/2, r.w, t); }
                    if (r.door === 'south') { createWall(r.cx - r.w/4 - ds/4, r.cz + r.d/2, r.w/2 - ds/2, t); createWall(r.cx + r.w/4 + ds/4, r.cz + r.d/2, r.w/2 - ds/2, t); } else { createWall(r.cx, r.cz + r.d/2, r.w, t); }
                    if (r.door === 'west') { createWall(r.cx - r.w/2, r.cz - r.d/4 - ds/4, t, r.d/2 - ds/2); createWall(r.cx - r.w/2, r.cz + r.d/4 + ds/4, t, r.d/2 - ds/2); } else { createWall(r.cx - r.w/2, r.cz, t, r.d); }
                    if (r.door === 'east') { createWall(r.cx + r.w/2, r.cz - r.d/4 - ds/4, t, r.d/2 - ds/2); createWall(r.cx + r.w/2, r.cz + r.d/4 + ds/4, t, r.d/2 - ds/2); } else { createWall(r.cx + r.w/2, r.cz, t, r.d); }
                    
                    let dx = r.cx, dz = r.cz;
                    if (r.door === 'north') dz = r.cz - r.d/2; if (r.door === 'south') dz = r.cz + r.d/2;
                    if (r.door === 'west') dx = r.cx - r.w/2; if (r.door === 'east') dx = r.cx + r.w/2;

                    const doorLight = new THREE.PointLight(0xffaa00, 2.0, 20); doorLight.position.set(dx, 4, dz); this.scene.add(doorLight);
                    const marker = new THREE.Mesh(new THREE.PlaneGeometry(6, 6), new THREE.MeshBasicMaterial({ color: 0xffaa00, transparent: true, opacity: 0.3, blending: THREE.AdditiveBlending }));
                    marker.rotation.x = -Math.PI / 2; marker.position.set(dx, 0.05, dz); this.scene.add(marker);
                });

                // 通路の障害物
                for (let i = 0; i < 60; i++) {
                    const x = (Math.random() - 0.5) * 160, z = (Math.random() - 0.5) * 160;
                    let inRoom = false;
                    this.rooms.forEach(r => { if (Math.abs(x - r.cx) < r.w/2 + 2 && Math.abs(z - r.cz) < r.d/2 + 2) inRoom = true; });
                    if (Math.abs(x) < 15 && Math.abs(z) < 15) inRoom = true;
                    if (!inRoom) createWall(x, z, 2 + Math.random() * 6, 2 + Math.random() * 6);
                }

                // 遺物
                const artifactGeo = new THREE.OctahedronGeometry(0.5);
                const artifactMat = new THREE.MeshBasicMaterial({ color: 0x00ffff, wireframe: true });
                for (let i = 0; i < TOTAL_ARTIFACTS; i++) {
                    const artifact = new THREE.Mesh(artifactGeo, artifactMat);
                    artifact.position.set(this.rooms[i].cx, 1.5, this.rooms[i].cz);
                    artifact.add(new THREE.PointLight(0x00ffff, 1, 10));
                    this.scene.add(artifact); this.artifacts.push({ mesh: artifact, collected: false });
                }
                
                // 通常世界の電池
                const batteryGeo = new THREE.CylinderGeometry(0.15, 0.15, 0.6, 8);
                const batteryMat = new THREE.MeshStandardMaterial({ color: 0x00ff00, emissive: 0x00aa00, emissiveIntensity: 2.0 }); // 発光で代用
                for (let i = 0; i < 8; i++) {
                    const battery = new THREE.Mesh(batteryGeo, batteryMat);
                    battery.rotation.z = Math.PI / 2; 
                    this.scene.add(battery);
                    const batObj = { mesh: battery, room: (i < 5) ? i : -1, inBackrooms: false, collected: false };
                    this.batteries.push(batObj); this.respawnBattery(batObj);
                }

                // 点滅する蛍光灯
                const tubeGeo = new THREE.CylinderGeometry(0.1, 0.1, 4, 8); tubeGeo.rotateZ(Math.PI / 2);
                for (let i = 0; i < 15; i++) {
                    const lx = (Math.random() - 0.5) * 160, lz = (Math.random() - 0.5) * 160;
                    const tubeMesh = new THREE.Mesh(tubeGeo, new THREE.MeshStandardMaterial({ color: 0xffffff, emissive: 0xaaccff, emissiveIntensity: 1 }));
                    tubeMesh.position.set(lx, 9.5, lz);
                    const pLight = new THREE.PointLight(0xaaccff, 1.5, 30); tubeMesh.add(pLight); this.scene.add(tubeMesh);
                    this.fluorescentLights.push({ mesh: tubeMesh, light: pLight, baseIntensity: 1.5, timer: 0, state: 'on' });
                }
            }

            setupBackrooms() {
                // Backrooms特有のテクスチャ
                const createBRWallTexture = () => {
                    const canvas = document.createElement('canvas'); canvas.width = 512; canvas.height = 512; const ctx = canvas.getContext('2d');
                    ctx.fillStyle = '#dcb46a'; ctx.fillRect(0, 0, 512, 512); // くすんだ黄色
                    ctx.lineWidth = 2; ctx.strokeStyle = 'rgba(150, 100, 30, 0.15)';
                    for(let x = 0; x < 512; x += 32) {
                        ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, 512); ctx.stroke();
                        for(let y = 0; y < 512; y += 64) { ctx.beginPath(); ctx.arc(x + 16, y + 32, 10, 0, Math.PI*2); ctx.stroke(); }
                    }
                    ctx.fillStyle = '#5c4b33'; ctx.fillRect(0, 480, 512, 32); // 幅木
                    const tex = new THREE.CanvasTexture(canvas); tex.wrapS = THREE.RepeatWrapping; tex.wrapT = THREE.RepeatWrapping; tex.repeat.set(2, 2); tex.needsUpdate = true; return tex;
                };

                const createBRFloorTexture = () => {
                    const canvas = document.createElement('canvas'); canvas.width = 512; canvas.height = 512; const ctx = canvas.getContext('2d');
                    ctx.fillStyle = '#8c7e5a'; ctx.fillRect(0, 0, 512, 512); // カーペット
                    ctx.fillStyle = 'rgba(50, 40, 20, 0.1)';
                    for(let i = 0; i < 15000; i++) { ctx.fillRect(Math.random() * 512, Math.random() * 512, 3, 3); }
                    for(let i = 0; i < 20; i++) { ctx.beginPath(); ctx.arc(Math.random() * 512, Math.random() * 512, 10 + Math.random() * 40, 0, Math.PI*2); ctx.fill(); }
                    const tex = new THREE.CanvasTexture(canvas); tex.wrapS = THREE.RepeatWrapping; tex.wrapT = THREE.RepeatWrapping; tex.repeat.set(15, 15); tex.needsUpdate = true; return tex;
                };

                const createBRCeilTexture = () => {
                    const canvas = document.createElement('canvas'); canvas.width = 256; canvas.height = 256; const ctx = canvas.getContext('2d');
                    ctx.fillStyle = '#e0e0e0'; ctx.fillRect(0, 0, 256, 256); // オフィス天井
                    ctx.strokeStyle = '#999999'; ctx.lineWidth = 4; ctx.strokeRect(0, 0, 256, 256);
                    ctx.fillStyle = 'rgba(0,0,0,0.02)';
                    for(let i=0; i<100; i++) ctx.fillRect(Math.random()*256, Math.random()*256, 10, 10);
                    const tex = new THREE.CanvasTexture(canvas); tex.wrapS = THREE.RepeatWrapping; tex.wrapT = THREE.RepeatWrapping; tex.repeat.set(20, 20); tex.needsUpdate = true; return tex;
                };

                // 光源計算を省き、テクスチャが直接見えるBasicMaterialを使用して負荷を激減
                const brWallMat = new THREE.MeshBasicMaterial({ map: createBRWallTexture() });
                const brFloorMat = new THREE.MeshBasicMaterial({ map: createBRFloorTexture() });
                const brCeilMat = new THREE.MeshBasicMaterial({ map: createBRCeilTexture() });
                
                const floorGeo = new THREE.PlaneGeometry(400, 400);
                const brFloor = new THREE.Mesh(floorGeo, brFloorMat); brFloor.rotation.x = -Math.PI / 2; brFloor.position.copy(this.backroomsOffset); this.scene.add(brFloor);
                const brCeiling = new THREE.Mesh(floorGeo, brCeilMat); brCeiling.rotation.x = Math.PI / 2; brCeiling.position.copy(this.backroomsOffset); brCeiling.position.y += 10; this.scene.add(brCeiling);

                const brBounds = [
                    { x: 0, z: 200, w: 400, d: 2 }, { x: 0, z: -200, w: 400, d: 2 },
                    { x: 200, z: 0, w: 2, d: 400 }, { x: -200, z: 0, w: 2, d: 400 }
                ];
                brBounds.forEach(b => {
                    const bMesh = new THREE.Mesh(new THREE.BoxGeometry(b.w, 10, b.d), brWallMat);
                    bMesh.position.set(this.backroomsOffset.x + b.x, 5, this.backroomsOffset.z + b.z);
                    this.scene.add(bMesh); this.colliders.push(new THREE.Box3().setFromObject(bMesh));
                });

                for (let i = 0; i < 150; i++) {
                    const x = (Math.random() - 0.5) * 360, z = (Math.random() - 0.5) * 360;
                    if (Math.abs(x) < 20 && Math.abs(z) < 20) continue; // スタート位置除外
                    if (Math.abs(x) < 25 && z < -70 && z > -190) continue; // 階段エリアを除外
                    const w = 4 + Math.random() * 10, d = 4 + Math.random() * 10;
                    const wall = new THREE.Mesh(new THREE.BoxGeometry(w, 10, d), brWallMat);
                    wall.position.set(this.backroomsOffset.x + x, 5, this.backroomsOffset.z + z);
                    this.scene.add(wall); this.colliders.push(new THREE.Box3().setFromObject(wall));
                }

                // 疑似的な天井照明（ただの白い棒にして負荷を減らす）
                const tubeGeo = new THREE.CylinderGeometry(0.1, 0.1, 4, 8); tubeGeo.rotateZ(Math.PI / 2);
                const tubeMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
                for (let i = 0; i < 40; i++) {
                    const lx = this.backroomsOffset.x + (Math.random() - 0.5) * 360;
                    const lz = this.backroomsOffset.z + (Math.random() - 0.5) * 360;
                    const tubeMesh = new THREE.Mesh(tubeGeo, tubeMat);
                    tubeMesh.position.set(lx, 9.9, lz);
                    this.scene.add(tubeMesh);
                }

                // 階段
                this.stairZone = { minX: -10, maxX: 10, startZ: -80, endZ: -180, startY: 2, endY: 30 };
                const stairGroup = new THREE.Group();
                const marbleMat = new THREE.MeshBasicMaterial({ color: 0xffffff });
                const carpetMat = new THREE.MeshBasicMaterial({ color: 0xaa0000 });
                const numSteps = 80;
                const stepH = this.stairZone.endY / numSteps;
                const stepD = (this.stairZone.startZ - this.stairZone.endZ) / numSteps;

                for (let i = 0; i < numSteps; i++) {
                    const step = new THREE.Mesh(new THREE.BoxGeometry(20, stepH, stepD), marbleMat);
                    step.position.set(0, i * stepH + stepH/2, -i * stepD - stepD/2); stairGroup.add(step);
                    const carpet = new THREE.Mesh(new THREE.BoxGeometry(10, stepH + 0.02, stepD + 0.02), carpetMat);
                    carpet.position.copy(step.position); stairGroup.add(carpet);
                }
                stairGroup.position.set(this.backroomsOffset.x, 0, this.backroomsOffset.z + this.stairZone.startZ);
                this.scene.add(stairGroup);

                // 階段の頂上の光
                const heavenlyLight = new THREE.PointLight(0xffffff, 5.0, 100);
                heavenlyLight.position.set(this.backroomsOffset.x, this.stairZone.endY + 10, this.backroomsOffset.z + this.stairZone.endZ);
                this.scene.add(heavenlyLight);

                const stairWallGeo = new THREE.BoxGeometry(2, this.stairZone.endY + 10, this.stairZone.startZ - this.stairZone.endZ);
                const lWall = new THREE.Mesh(stairWallGeo, new THREE.MeshBasicMaterial({visible:false})); lWall.position.set(this.backroomsOffset.x - 11, this.stairZone.endY/2, this.backroomsOffset.z + (this.stairZone.startZ + this.stairZone.endZ)/2); this.scene.add(lWall); this.colliders.push(new THREE.Box3().setFromObject(lWall));
                const rWall = new THREE.Mesh(stairWallGeo, new THREE.MeshBasicMaterial({visible:false})); rWall.position.set(this.backroomsOffset.x + 11, this.stairZone.endY/2, this.backroomsOffset.z + (this.stairZone.startZ + this.stairZone.endZ)/2); this.scene.add(rWall); this.colliders.push(new THREE.Box3().setFromObject(rWall));

                // 案内矢印
                const createArrowTexture = () => {
                    const canvas = document.createElement('canvas'); canvas.width = 256; canvas.height = 256; const ctx = canvas.getContext('2d');
                    ctx.fillStyle = 'rgba(0,0,0,0)'; ctx.fillRect(0, 0, 256, 256);
                    ctx.fillStyle = 'rgba(30, 20, 10, 0.7)'; ctx.beginPath(); ctx.moveTo(128, 230); ctx.lineTo(200, 130); ctx.lineTo(150, 130); ctx.lineTo(150, 30); ctx.lineTo(106, 30); ctx.lineTo(106, 130); ctx.lineTo(56, 130); ctx.closePath(); ctx.fill();
                    return new THREE.CanvasTexture(canvas);
                };
                const arrowMat = new THREE.MeshBasicMaterial({ map: createArrowTexture(), transparent: true, depthWrite: false });
                const arrowGeo = new THREE.PlaneGeometry(12, 12);
                const targetStairPos = new THREE.Vector3(this.backroomsOffset.x, 0, this.backroomsOffset.z + this.stairZone.startZ);

                for (let i = 0; i < 45; i++) {
                    const ax = this.backroomsOffset.x + (Math.random() - 0.5) * 340, az = this.backroomsOffset.z + (Math.random() - 0.5) * 340;
                    if (Math.abs(ax - this.backroomsOffset.x) < 30 && az < this.backroomsOffset.z + this.stairZone.startZ) continue;
                    const arrowGroup = new THREE.Group(); arrowGroup.position.set(ax, 0.05, az);
                    const arrowMesh = new THREE.Mesh(arrowGeo, arrowMat); arrowMesh.rotation.x = -Math.PI / 2; arrowGroup.add(arrowMesh);
                    arrowGroup.lookAt(targetStairPos); this.scene.add(arrowGroup);
                }

                // Backrooms用電池 (30個)
                const batteryGeo = new THREE.CylinderGeometry(0.15, 0.15, 0.6, 8);
                const batteryMat = new THREE.MeshStandardMaterial({ color: 0x00ff00, emissive: 0x00aa00, emissiveIntensity: 2.0 });
                for (let i = 0; i < 30; i++) {
                    const battery = new THREE.Mesh(batteryGeo, batteryMat);
                    battery.rotation.z = Math.PI / 2; this.scene.add(battery);
                    const batObj = { mesh: battery, room: -1, inBackrooms: true, collected: false };
                    this.batteries.push(batObj); this.respawnBattery(batObj);
                }
            }

            respawnBattery(batteryObj) {
                let bx, bz;
                let valid = false;
                while(!valid) {
                    if (batteryObj.inBackrooms) {
                        bx = this.backroomsOffset.x + (Math.random() - 0.5) * 360; bz = this.backroomsOffset.z + (Math.random() - 0.5) * 360;
                        if (Math.abs(bx - this.backroomsOffset.x) < 20 && bz < this.backroomsOffset.z + this.stairZone.startZ + 20 && bz > this.backroomsOffset.z + this.stairZone.endZ - 20) continue;
                        valid = true;
                    } else if (batteryObj.room >= 0) {
                        const r = this.rooms[batteryObj.room]; bx = r.cx + (Math.random() - 0.5) * (r.w - 6); bz = r.cz + (Math.random() - 0.5) * (r.d - 6);
                    } else {
                        bx = (Math.random() - 0.5) * 160; bz = (Math.random() - 0.5) * 160;
                        if (Math.hypot(bx - this.camera.position.x, bz - this.camera.position.z) < 10) continue;
                    }
                    if (!valid) {
                        const batBox = new THREE.Box3(new THREE.Vector3(bx - 0.5, 0, bz - 0.5), new THREE.Vector3(bx + 0.5, 1, bz + 0.5));
                        let collide = false;
                        for (let box of this.colliders) { if (batBox.intersectsBox(box)) { collide = true; break; } }
                        if (!collide) valid = true;
                    }
                }
                batteryObj.mesh.position.set(bx, 0.3, bz); batteryObj.mesh.visible = true; batteryObj.collected = false;
            }

            setupPlayer() {
                this.player = { speed: 5.0, radius: 1.0, battery: 100, flashlightOn: true, velocity: new THREE.Vector3() };
                this.heartRate = 70; this.camera.position.set(0, 2, 0);
                this.flashlight = new THREE.SpotLight(0xffeedd, 3.0, 60, Math.PI / 5, 0.5, 1);
                this.flashlight.position.set(0, 0, 0); this.flashlight.target.position.set(0, 0, -1);
                this.camera.add(this.flashlight); this.camera.add(this.flashlight.target); this.scene.add(this.camera);
                this.ambientLight = new THREE.AmbientLight(0x111122, 0.1); this.scene.add(this.ambientLight);
                this.stepTimer = 0; this.updateBatteryUI(); flashlightBtn.classList.add('active');
            }
            
            toggleFlashlight(forceOff = false) {
                if (forceOff && !this.player.flashlightOn) return;
                if (!forceOff && this.player.battery <= 0 && !this.player.flashlightOn) return;
                this.player.flashlightOn = forceOff ? false : !this.player.flashlightOn;
                this.flashlight.visible = this.player.flashlightOn;
                AudioEngine.playClickSound();
                
                if(this.player.flashlightOn) { flashlightBtn.classList.add('active'); this.ambientLight.intensity = this.inBackrooms ? 1.0 : 0.1; } 
                else { flashlightBtn.classList.remove('active'); this.ambientLight.intensity = this.inBackrooms ? 1.0 : 0.02; }
            }
            
            updateBatteryUI() {
                batteryBar.style.width = `${this.player.battery}%`;
                if (this.player.battery > 50) batteryBar.className = 'h-full transition-all duration-200 w-full bg-green-500';
                else if (this.player.battery > 20) batteryBar.className = 'h-full transition-all duration-200 w-full bg-yellow-500';
                else batteryBar.className = 'h-full transition-all duration-200 w-full bg-red-600';
            }

            setupEnemy() {
                const enemyMesh = new THREE.Mesh(new THREE.CylinderGeometry(1, 1, 4, 8), new THREE.MeshBasicMaterial({ color: 0x000000 }));
                const eyeMat = new THREE.MeshBasicMaterial({ color: 0xff0000 });
                const leftEye = new THREE.Mesh(new THREE.SphereGeometry(0.15), eyeMat); leftEye.position.set(-0.3, 1.5, 0.9);
                const rightEye = new THREE.Mesh(new THREE.SphereGeometry(0.15), eyeMat); rightEye.position.set(0.3, 1.5, 0.9);
                const eyeLight = new THREE.PointLight(0xff0000, 1, 5); eyeLight.position.set(0, 1.5, 1);
                enemyMesh.add(leftEye); enemyMesh.add(rightEye); enemyMesh.add(eyeLight);
                this.scene.add(enemyMesh);
                this.enemy = { mesh: enemyMesh, baseSpeed: 2.0, active: true };
                this.respawnEnemy();
            }

            respawnEnemy() {
                let ex, ez; let valid = false;
                while(!valid) {
                    ex = (Math.random() - 0.5) * 160; ez = (Math.random() - 0.5) * 160;
                    if (Math.hypot(ex - this.camera.position.x, ez - this.camera.position.z) < 40) continue;
                    const enemyBox = new THREE.Box3(new THREE.Vector3(ex - 1.5, 0, ez - 1.5), new THREE.Vector3(ex + 1.5, 4, ez + 1.5));
                    let collide = false;
                    for (let box of this.colliders) { if (enemyBox.intersectsBox(box)) { collide = true; break; } }
                    if (!collide) valid = true;
                }
                this.enemy.mesh.position.set(ex, 2, ez);
            }

            setupInput() {
                this.keys = { w: false, a: false, s: false, d: false }; this.isLocked = false; this.fKeyPressed = false;
                window.addEventListener('keydown', (e) => {
                    const key = e.key.toLowerCase(); if (this.keys.hasOwnProperty(key)) this.keys[key] = true;
                    if (key === 'f' && gameState === 'PLAYING' && !this.fKeyPressed) { this.toggleFlashlight(); this.fKeyPressed = true; }
                });
                window.addEventListener('keyup', (e) => {
                    const key = e.key.toLowerCase(); if (this.keys.hasOwnProperty(key)) this.keys[key] = false;
                    if (key === 'f') this.fKeyPressed = false;
                });
                this.renderer.domElement.addEventListener('click', () => { if (gameState === 'PLAYING' && !this.isLocked && this.renderer.domElement.requestPointerLock) this.renderer.domElement.requestPointerLock(); });
                document.addEventListener('pointerlockchange', () => { this.isLocked = document.pointerLockElement === this.renderer.domElement; });
                this.euler = new THREE.Euler(0, 0, 0, 'YXZ');
                document.addEventListener('mousemove', (e) => {
                    if (this.isLocked && gameState === 'PLAYING') {
                        const mx = e.movementX || 0, my = e.movementY || 0;
                        this.euler.setFromQuaternion(this.camera.quaternion);
                        this.euler.y -= mx * 0.002; this.euler.x -= my * 0.002;
                        this.euler.x = Math.max(-Math.PI/2, Math.min(Math.PI/2, this.euler.x));
                        this.camera.quaternion.setFromEuler(this.euler);
                    }
                });
                this.touchLeft = { active: false, id: null, startX: 0, startY: 0, dx: 0, dy: 0 };
                this.touchRight = { active: false, id: null, lastX: 0, lastY: 0 };
                this.renderer.domElement.addEventListener('touchstart', (e) => {
                    if (gameState !== 'PLAYING') return;
                    for (let i = 0; i < e.changedTouches.length; i++) {
                        const t = e.changedTouches[i];
                        if (t.clientX < window.innerWidth / 2) { this.touchLeft.active = true; this.touchLeft.id = t.identifier; this.touchLeft.startX = t.clientX; this.touchLeft.startY = t.clientY; } 
                        else { this.touchRight.active = true; this.touchRight.id = t.identifier; this.touchRight.lastX = t.clientX; this.touchRight.lastY = t.clientY; }
                    }
                }, {passive: false});
                this.renderer.domElement.addEventListener('touchmove', (e) => {
                    if (gameState !== 'PLAYING') return; e.preventDefault();
                    for (let i = 0; i < e.changedTouches.length; i++) {
                        const t = e.changedTouches[i];
                        if (this.touchLeft.active && t.identifier === this.touchLeft.id) {
                            this.touchLeft.dx = t.clientX - this.touchLeft.startX; this.touchLeft.dy = t.clientY - this.touchLeft.startY;
                            const dist = Math.hypot(this.touchLeft.dx, this.touchLeft.dy);
                            if (dist > 50) { this.touchLeft.dx = (this.touchLeft.dx / dist) * 50; this.touchLeft.dy = (this.touchLeft.dy / dist) * 50; }
                        }
                        if (this.touchRight.active && t.identifier === this.touchRight.id) {
                            const dx = t.clientX - this.touchRight.lastX, dy = t.clientY - this.touchRight.lastY;
                            this.touchRight.lastX = t.clientX; this.touchRight.lastY = t.clientY;
                            this.euler.setFromQuaternion(this.camera.quaternion);
                            this.euler.y -= dx * 0.005; this.euler.x -= dy * 0.005;
                            this.euler.x = Math.max(-Math.PI/2, Math.min(Math.PI/2, this.euler.x));
                            this.camera.quaternion.setFromEuler(this.euler);
                        }
                    }
                }, {passive: false});
                const endTouch = (e) => {
                    for (let i = 0; i < e.changedTouches.length; i++) {
                        const t = e.changedTouches[i];
                        if (this.touchLeft.id === t.identifier) { this.touchLeft.active = false; this.touchLeft.dx=0; this.touchLeft.dy=0; }
                        if (this.touchRight.id === t.identifier) this.touchRight.active = false;
                    }
                };
                this.renderer.domElement.addEventListener('touchend', endTouch); this.renderer.domElement.addEventListener('touchcancel', endTouch);
            }

            checkCollision(nextPos) {
                const r = this.player.radius;
                const playerBox = new THREE.Box3(new THREE.Vector3(nextPos.x - r, 0, nextPos.z - r), new THREE.Vector3(nextPos.x + r, 4, nextPos.z + r));
                for (let box of this.colliders) { if (playerBox.intersectsBox(box)) return true; }
                return false;
            }

            teleportToBackrooms() {
                this.inBackrooms = true;
                this.camera.position.set(this.backroomsOffset.x, 2, this.backroomsOffset.z);
                this.enemy.mesh.position.set(this.backroomsOffset.x, 2, this.backroomsOffset.z + 50);
                
                // 霧を黄色くする
                this.scene.fog.density = 0.02; 
                this.scene.fog.color.setHex(0xaaaa66); 
                
                this.ambientLight.color.setHex(0xffffee); this.ambientLight.intensity = 1.0;
                if (this.player.flashlightOn) this.toggleFlashlight(true);

                const flash = document.createElement('div');
                flash.style.position = 'absolute'; flash.style.top = '0'; flash.style.left = '0'; flash.style.width = '100%'; flash.style.height = '100%'; flash.style.background = 'white'; flash.style.zIndex = '100'; flash.style.pointerEvents = 'none'; flash.style.transition = 'opacity 2s ease-out';
                document.body.appendChild(flash);
                
                const scoreParent = document.getElementById('score').parentNode;
                scoreParent.innerHTML = '<span class="text-yellow-500 glitch font-bold text-3xl" style="text-shadow: 0 0 10px yellow;">光へ向かえ</span>';
                
                setTimeout(() => { flash.style.opacity = '0'; }, 50); setTimeout(() => { flash.remove(); }, 2050);
            }

            update(dt) {
                if (gameState !== 'PLAYING') return;

                let inputX = Number(this.keys.d) - Number(this.keys.a), inputZ = Number(this.keys.s) - Number(this.keys.w);
                if (this.touchLeft.active) { inputZ = this.touchLeft.dy / 50; inputX = this.touchLeft.dx / 50; }
                const inputDir = new THREE.Vector3(inputX, 0, inputZ);
                if (inputDir.lengthSq() > 1) inputDir.normalize();
                inputDir.applyQuaternion(this.camera.quaternion); inputDir.y = 0;
                if (inputDir.lengthSq() > 0) inputDir.normalize();

                const targetVelocity = inputDir.multiplyScalar(this.player.speed);
                this.player.velocity.lerp(targetVelocity, dt * 8);

                if (this.player.velocity.lengthSq() > 0.1) {
                    this.stepTimer += dt;
                    if (this.stepTimer > 0.4) { AudioEngine.playFootstep(); this.stepTimer = 0; }
                }

                const nextPos = this.camera.position.clone();
                nextPos.x += this.player.velocity.x * dt;
                if (!this.checkCollision(nextPos)) this.camera.position.x = nextPos.x; else this.player.velocity.x = 0;
                nextPos.x = this.camera.position.x; nextPos.z += this.player.velocity.z * dt;
                if (!this.checkCollision(nextPos)) this.camera.position.z = nextPos.z; else this.player.velocity.z = 0;

                if (!this.inBackrooms) {
                    const r = this.player.radius;
                    const playerBox = new THREE.Box3(new THREE.Vector3(this.camera.position.x - r, 0, this.camera.position.z - r), new THREE.Vector3(this.camera.position.x + r, 4, this.camera.position.z + r));
                    if (this.backroomsPortalBox.intersectsBox(playerBox)) this.teleportToBackrooms();
                } else {
                    const pX = this.camera.position.x - this.backroomsOffset.x, pZ = this.camera.position.z - this.backroomsOffset.z;
                    if (pX > this.stairZone.minX && pX < this.stairZone.maxX && pZ < this.stairZone.startZ && pZ > this.stairZone.endZ) {
                        let progress = (this.stairZone.startZ - pZ) / (this.stairZone.startZ - this.stairZone.endZ);
                        progress = Math.max(0, Math.min(1, progress));
                        this.camera.position.y = this.stairZone.startY + progress * (this.stairZone.endY - this.stairZone.startY);
                        if (progress > 0.98) { triggerWin(); return; }
                    } else { this.camera.position.y = 2; }
                }

                if (this.player.flashlightOn) {
                    if (!this.inBackrooms) {
                        this.player.battery -= dt * 1.5; 
                        if (this.player.battery <= 0) { this.player.battery = 0; this.toggleFlashlight(true); }
                        this.updateBatteryUI();
                        this.flashlight.intensity = Math.random() < (this.player.battery < 20 ? 0.1 : 0.02) ? 1.0 + Math.random() * 2.0 : 3.0;
                    } else {
                        this.flashlight.intensity = 3.0;
                    }
                }

                this.fluorescentLights.forEach(fl => {
                    fl.timer -= dt;
                    if (fl.timer <= 0) {
                        const r = Math.random();
                        if (r < 0.6) { fl.state = 'on'; fl.timer = 2 + Math.random() * 5; }
                        else if (r < 0.85) { fl.state = 'flicker'; fl.timer = 0.5 + Math.random() * 2; }
                        else { fl.state = 'off'; fl.timer = 0.5 + Math.random() * 2; }
                    }
                    if (fl.state === 'on') { fl.light.intensity = fl.baseIntensity; fl.mesh.material.emissiveIntensity = 1; }
                    else if (fl.state === 'off') { fl.light.intensity = 0; fl.mesh.material.emissiveIntensity = 0; }
                    else if (fl.state === 'flicker') {
                        if (Math.random() < 0.3) { fl.light.intensity = fl.baseIntensity * Math.random(); fl.mesh.material.emissiveIntensity = fl.light.intensity / fl.baseIntensity; }
                        else { fl.light.intensity = 0; fl.mesh.material.emissiveIntensity = 0; }
                    }
                });

                if (this.portalMat) this.portalMat.opacity = 0.8 + Math.sin(Date.now() * 0.01) * 0.2;

                this.artifacts.forEach(item => {
                    if (!item.collected && !this.inBackrooms) {
                        item.mesh.rotation.y += dt; item.mesh.rotation.x += dt * 0.5;
                        if (this.camera.position.distanceTo(item.mesh.position) < 2.5) {
                            item.collected = true; item.mesh.visible = false; this.artifactsCollected++; scoreEl.innerText = this.artifactsCollected;
                            AudioEngine.playArtifactSound(); this.enemy.baseSpeed += 0.6;
                            if (this.artifactsCollected >= TARGET_ARTIFACTS) { triggerWin(); }
                            else if(Math.random() < 0.5) { const backVec = new THREE.Vector3(0, 0, 15).applyQuaternion(this.camera.quaternion); this.enemy.mesh.position.copy(this.camera.position).add(backVec); this.enemy.mesh.position.y = 2; }
                        }
                    }
                });

                this.batteries.forEach(bat => {
                    if (!bat.collected && bat.mesh.visible) {
                        bat.mesh.rotation.y += dt * 2;
                        if (this.camera.position.distanceTo(bat.mesh.position) < 2.5) {
                            bat.collected = true; bat.mesh.visible = false;
                            this.player.battery = Math.min(100, this.player.battery + 35); this.updateBatteryUI();
                            AudioEngine.playBatterySound();
                            setTimeout(() => { if(gameState === 'PLAYING') this.respawnBattery(bat); }, 10000);
                        }
                    }
                });

                // --- 敵の追跡 と 心拍数 ---
                if (this.enemy && this.enemy.active) {
                    const dir = new THREE.Vector3().subVectors(this.camera.position, this.enemy.mesh.position); dir.y = 0;
                    const dist = dir.length();
                    let targetHeartRate = 70;
                    if (dist < 40) targetHeartRate = 70 + Math.pow((40 - dist) / 40, 2) * 110;
                    this.heartRate += (targetHeartRate - this.heartRate) * dt * 2;
                    AudioEngine.playHeartbeat(this.heartRate);

                    hrText.innerText = Math.floor(this.heartRate);
                    let hrPct = Math.max(0, Math.min(100, ((this.heartRate - 70) / 100) * 100));
                    hrBar.style.width = Math.max(5, hrPct) + '%';
                    
                    if (this.heartRate > 100) {
                        const pulse = Math.sin(Date.now() * 0.01 * (this.heartRate / 60)) * 0.5 + 0.5;
                        hrBar.style.backgroundColor = `rgb(255, ${Math.floor(50 * (1-pulse))}, ${Math.floor(50 * (1-pulse))})`;
                        hrText.style.color = pulse > 0.5 ? '#ff0000' : '#ffaaaa';
                    } else {
                        hrBar.style.backgroundColor = '#aa0000'; hrText.style.color = '#ff5555';
                    }

                    if (dist > 0) {
                        dir.normalize(); this.enemy.mesh.lookAt(this.camera.position.x, this.enemy.mesh.position.y, this.camera.position.z);
                        // Backrooms内では敵の速度を1.5倍にする
                        let currentSpeed = this.enemy.baseSpeed;
                        if (this.inBackrooms) {
                            currentSpeed *= 1.5; 
                        }
                        this.enemy.mesh.position.add(dir.multiplyScalar(currentSpeed * dt));
                    }

                    if (dist < 20) fearOverlay.style.opacity = (1 - (dist / 20)) * 0.9; else fearOverlay.style.opacity = 0;
                    if (dist < 1.5) triggerGameOver();
                }
            }

            render() { this.renderer.render(this.scene, this.camera); }
            onWindowResize() { this.camera.aspect = window.innerWidth / window.innerHeight; this.camera.updateProjectionMatrix(); this.renderer.setSize(window.innerWidth, window.innerHeight); }
            dispose() { window.removeEventListener('resize', this.onWindowResize); if(this.renderer && this.renderer.domElement) this.renderer.domElement.remove(); }
        }

        function gameLoop() {
            if (gameState !== 'PLAYING') return;
            const dt = Math.min(game.clock.getDelta(), 0.1); game.update(dt); game.render(); animationFrameId = requestAnimationFrame(gameLoop);
        }

        function startGame() {
            AudioEngine.init().then(() => {
                gameState = 'PLAYING'; scoreEl.innerText = "0";
                startScreen.classList.add('hidden'); gameOverScreen.classList.add('hidden'); clearScreen.classList.add('hidden');
                hud.classList.remove('hidden'); heartrateContainer.classList.remove('hidden'); crosshair.classList.remove('hidden'); fearOverlay.style.opacity = 0;
                
                if (window.innerWidth < 768 || ('ontouchstart' in window)) { mobileControls.classList.remove('hidden'); flashlightBtn.classList.remove('hidden'); }
                if (game) game.dispose(); game = new Game();
                
                AudioEngine.startBGM(); game.clock.start(); animationFrameId = requestAnimationFrame(gameLoop);
            });
        }

        function triggerGameOver() {
            gameState = 'GAMEOVER'; cancelAnimationFrame(animationFrameId); AudioEngine.stopBGM(); AudioEngine.playJumpscare();
            if (document.pointerLockElement) document.exitPointerLock();
            game.camera.lookAt(game.enemy.mesh.position); game.render(); fearOverlay.style.opacity = 1;
            setTimeout(() => {
                hud.classList.add('hidden'); heartrateContainer.classList.add('hidden'); crosshair.classList.add('hidden'); mobileControls.classList.add('hidden'); flashlightBtn.classList.add('hidden');
                gameOverScreen.classList.remove('hidden'); fearOverlay.style.opacity = 0;
            }, 500);
        }

        function triggerWin() {
            gameState = 'CLEAR'; cancelAnimationFrame(animationFrameId); AudioEngine.stopBGM();
            if (document.pointerLockElement) document.exitPointerLock();
            const synth = new Tone.PolySynth().toDestination(); synth.triggerAttackRelease(["C4", "E4", "G4", "C5"], "2n");
            hud.classList.add('hidden'); heartrateContainer.classList.add('hidden'); crosshair.classList.add('hidden'); mobileControls.classList.add('hidden'); flashlightBtn.classList.add('hidden');
            clearScreen.classList.remove('hidden'); fearOverlay.style.opacity = 0;
        }

        startBtn.addEventListener('click', startGame); restartBtn.addEventListener('click', startGame); clearRestartBtn.addEventListener('click', startGame);
        flashlightBtn.addEventListener('touchstart', (e) => { e.preventDefault(); if (game) game.toggleFlashlight(); });
        flashlightBtn.addEventListener('click', (e) => { e.preventDefault(); if (game) game.toggleFlashlight(); });
    </script>
</body>
</html>
